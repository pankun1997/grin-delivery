name: Deploy Preview

on:
  push:
    branches:
      - feature/customer-journey-page
  workflow_dispatch:

concurrency:
  group: cloudflare-preview
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build preview worker
        run: npx opennextjs-cloudflare build

      - name: Use isolated preview config
        run: cp wrangler.preview.jsonc wrangler.jsonc

      - name: Deploy preview worker
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Add preview link to summary
        run: |
          echo "## GRIN Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "Open the deployed Worker, then add \`/preview\` to the URL." >> "$GITHUB_STEP_SUMMARY"
          echo "Worker name: \`grin-delivery-preview\`" >> "$GITHUB_STEP_SUMMARY"
